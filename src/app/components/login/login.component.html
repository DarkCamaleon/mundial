<div
  class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-emerald-950 via-slate-900 to-black flex items-center justify-center p-4 sm:p-6 md:p-8 font-sans">

  <!-- Background glow effects -->
  <div class="absolute w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl -top-12 -left-12 pointer-events-none"></div>
  <div class="absolute w-96 h-96 bg-lime-500/5 rounded-full blur-3xl -bottom-12 -right-12 pointer-events-none"></div>

  <div class="w-full max-w-md relative z-10">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div
        class="inline-flex p-3 rounded-full bg-emerald-950/80 border border-emerald-500/30 shadow-lg shadow-emerald-950/50 mb-3 animate-pulse">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-400" viewBox="0 0 20 20"
          fill="currentColor">
          <path fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
            clip-rule="evenodd" />
        </svg>
      </div>
      <h1
        class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-lime-300 tracking-tight uppercase">
        MUNDIAL</h1>

    </div>

    <!-- Main Card -->
    <div
      class="backdrop-blur-xl bg-slate-900/60 border border-slate-700/50 rounded-2xl p-6 md:p-8 shadow-2xl shadow-black/80">
      <h2 class="text-xl font-bold text-white mb-6">Iniciar Sesión</h2>

      <form (submit)="onSubmit()" class="space-y-5">
        <!-- Error Banner -->
        @if (error()) {
        <div
          class="p-3 bg-red-950/80 border border-red-500/50 text-red-300 text-xs rounded-lg flex items-start space-x-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 text-red-400 mt-0.5" viewBox="0 0 20 20"
            fill="currentColor">
            <path fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd" />
          </svg>
          <span>{{ error() }}</span>
        </div>
        }

        <!-- Usuario -->
        <div>
          <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
            Usuario
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" viewBox="0 0 20 20"
                fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
              </svg>
            </div>
            <input type="text" id="username" name="username" [(ngModel)]="username" placeholder="tu_usuario"
              class="w-full bg-slate-950/50 border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white rounded-lg pl-9 pr-4 py-2.5 text-sm transition-all outline-none"
              [disabled]="loading()" autocomplete="username" required />
          </div>
        </div>

        <!-- Contraseña -->
        <div>
          <label for="password"
            class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Contraseña</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-500" viewBox="0 0 20 20"
                fill="currentColor">
                <path fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd" />
              </svg>
            </div>
            <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="••••••••"
              class="w-full bg-slate-950/50 border border-slate-800 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white rounded-lg pl-9 pr-4 py-2.5 text-sm transition-all outline-none"
              [disabled]="loading()" autocomplete="current-password" required />
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="btn-login-submit" [disabled]="loading()"
          class="w-full py-2.5 px-4 bg-gradient-to-r from-emerald-600 to-lime-600 hover:from-emerald-500 hover:to-lime-500 active:scale-[0.98] text-white text-sm font-bold rounded-lg shadow-lg shadow-emerald-950/50 hover:shadow-emerald-500/20 transition-all focus:outline-none flex items-center justify-center space-x-2 cursor-pointer disabled:opacity-50">
          @if (loading()) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          <span>Iniciando sesión...</span>
          } @else {
          <span>Ingresar</span>
          }
        </button>
      </form>

    </div>
  </div>
</div>
